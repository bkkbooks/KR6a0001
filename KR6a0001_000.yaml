front:
  text: 長阿含經序長安釋僧肇述夫宗極絕於稱謂賢聖以之沖默玄旨非言不傳釋迦所以致教是以如來出世大教有三約身口則防之以禁律明善惡則導之以契經演幽微則辨之以法相然則三藏之作也本於殊應會之有宗則異途同趣矣禁律律藏也四分十誦法相阿毗曇藏也四分五誦契經四阿含藏也增一阿含四分八誦中阿含四分五誦雜阿含四分十誦此長阿含四分四誦合三十經以為一部阿含秦言法歸法歸者蓋是萬善之淵府總持之林苑其為典也淵博弘富韞而彌廣明宣禍福賢愚之迹剖判真偽異齊之原歷記古今成敗之數墟域二儀品物之倫道無不由法無不在譬彼巨海百川所歸故以法歸為名開析修途所記長遠故以長為目翫茲典者長迷頓曉邪正難辨顯如晝夜報應冥昧照若影響劫數雖遼近猶朝夕六合雖曠現若目前斯可謂朗大明於幽室惠五目於眾瞽不闚戶牖而智無不周矣大秦天王滌除玄覽高韻獨邁恬智交養道世俱濟每懼微言翳於殊俗以右將軍使者司隸校尉晉公姚爽質直清柔玄心超詣尊尚大法妙悟自然上特留懷每任以法事以弘始十二年歲次上章閹茂請罽賓三藏沙門佛陀耶舍出律藏一分四十五卷十四年訖十五年歲次昭陽赤奮若出此長阿含訖涼州沙門佛念為譯秦國道士道含筆受時集京夏名勝沙門於第校定恭承法言敬受無差蠲華崇朴務存聖旨余以嘉遇猥參聽次雖無翼善之功而預親承之末故略記時事以示來賢焉

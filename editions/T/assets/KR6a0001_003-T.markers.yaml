  - {type: variant, offset: 3549, length: 0, content: '', 元: 時我出草廬彷徉經行彼大眾中有一人來至我所頭面禮足隨我經行我知而故問彼大眾聚何所為耶其人即問佛向在何所為覺寐耶答曰在此時不寐也其人亦歎希聞得定如佛者也雷電霹靂聲聒天地而獨寂定覺而不聞乃白佛言向有異雲暴起雷電霹靂殺四特牛耕者兄弟二人彼大眾聚時我出草廬彷徉經行彼大眾中有一人來至我所頭面禮足隨我經行我知而故問彼大眾聚何所為耶其人即問佛向在何所為覺寐耶答曰在此時不寐也其人亦歎希聞得定如佛者也雷電霹靂聲聒天地而獨寂定覺而不聞乃白佛言向有異雲暴起雷電霹靂殺四特牛耕者兄弟二人彼大眾聚}

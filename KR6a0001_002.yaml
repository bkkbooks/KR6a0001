body:
  text: 後秦弘始年佛陀耶舍共竺佛念譯二第一分遊行經第二初如是我聞一時佛在羅閲城耆闍崛山中與大比丘衆千二百五十人俱是時摩竭王阿闍世欲伐跋祇王自念言彼雖勇健人衆豪強以我取彼未足為難時阿闍世王命婆羅門大臣禹舍而告之曰汝詣耆闍崛山至世尊所持我名字禮世尊足問訊世尊起居輕利遊步強耶又白世尊跋祇國人自恃勇健民衆豪強不順伏我我欲伐之不審世尊何所誡敕若有教誡汝善憶念勿有遺漏如所聞説如來所言終不虛妄大臣禹舍受王教已即乘寶車詣耆闍崛山到所止處下車步進至世尊所問訊畢一面坐白世尊曰摩竭王阿闍世首佛足敬問殷勤起居輕利遊步強耶又白世尊跋祇國人自恃勇健民衆豪強不順伏我我欲伐之不審世尊何所誡敕爾時阿難在世尊後執扇扇佛佛告阿難汝聞跋祇國人數相集會講議正事不答曰聞之佛告阿難若能爾者長幼和順轉更增盛其國久安無能侵損阿難汝聞跋祇國人君臣和順上下相敬不答曰聞之阿難若能爾者長幼和順轉更增盛其國久安無能侵損阿難汝聞跋祇國人奉法曉忌不違禮度不答曰聞之阿難若能爾者長幼和順轉更增盛其國久安無能侵損阿難汝聞跋祇國人孝事父母敬順師長不答曰聞之阿難若能爾者長幼和順轉更增上其國久安無能侵損阿難汝聞跋祇國人恭於宗廟致敬鬼神不答曰聞之阿難若能爾者長幼和順轉更增上其國久安無能侵損阿難汝聞跋祇國人閨門真正潔淨無穢至於戲笑言不及邪不答曰聞之阿難若能爾者長幼和順轉更增盛其國久安無能侵損阿難汝聞跋祇國人宗事沙門敬持戒者瞻視護養未嘗懈惓不答曰聞之阿難若能爾者長幼和順轉更增盛其國久安無能侵損時大臣禹舍白佛言彼國人民若行一法猶不可圖況復具七國事多故今請辭還歸佛言可宜知是時時禹舍即從座起繞佛三匝揖讓而退其去未久佛告阿難汝敕羅閲祇左右諸比丘盡集講堂對曰唯然即詣羅閲祇城集諸比丘盡會講堂白世尊曰諸比丘已集唯聖知時爾時世尊即從座起詣法講堂就座而坐告諸比丘我當為汝説七不退法諦聽諦聽善思念之時諸比丘白佛言唯然世尊願樂欲聞佛告諸比丘七不退法者一曰數相集會講論正義則長幼和順法不可壞二曰上下和同敬順無違則長幼和順法不可壞三曰奉法曉忌不違制度則長幼和順法不可壞四曰若有比丘力能護衆多諸知識宜敬事之則長幼和順法不可壞五曰念護心意孝敬為首則長幼和順法不可壞六曰淨修梵行不隨欲態則長幼和順法不可壞七曰先人後己不貪名利則長幼和順法不可壞佛告比丘復有七法令法增長無有損耗一者樂於少事不好多為則法增長無有損耗二者樂於靜默不好多言三者少於睡眠無有昏昧四者不為群黨言無益事五者不以無德而自稱譽六者不與惡人而為伴黨七者樂於山林間靜獨處如是比丘則法增長無有損耗佛告比丘復有七法令法增長無有損耗何謂為七一者有信信於如來至真正覺十號具足二者知慚恥於己闕三者知愧羞為惡行四者多聞其所受持上中下善義味深奧清淨無穢梵行具足五者精勤苦行滅惡修善勤習不捨六者昔所學習憶念不忘七者修習智慧知生滅法趣賢聖要盡諸苦本如是七法則法增長無有損耗佛告比丘復有七法令法增長無有損耗何謂為七一者敬佛二者敬法三者敬僧四者敬戒五者敬定六者敬順父母七者敬不放逸如是七法則法增長無有損耗佛告比丘復有七法則法增長無有損耗何謂為七法一者觀身不淨二者觀食不淨三者不樂世間四者常念死想五者起無常想六者無常苦想七者苦無我想如是七法則法增長無有損耗佛告比丘復有七法則法增長無有損耗何謂為七一者修念覺意間靜無欲出要無為二者修法覺意三者修精進覺意四者修喜覺意五者修猗覺意六者修定覺意七者修護覺意如是七法則法增長無有損耗佛告比丘有六不退法令法增長無有損耗何謂為六一者身常行慈不害衆生二者口宣仁慈不演惡言三者意念慈心不懷壞損四者得淨利養與衆共之平等無二五者持賢聖戒無有闕漏亦無垢穢必定不動六者見賢聖道以盡苦際如是六法則法增長無有損耗佛告比丘復有六不退法令法增長無有損耗一者念佛二者念法三者念僧四者念戒五者念施六者念天修此六念則法增長無有損耗爾時世尊於羅閲祇隨宜住已告阿難言汝等皆嚴吾欲詣竹園對曰唯然即嚴衣鉢與諸大衆侍從世尊路由摩竭次到竹園往堂上坐與諸比丘説戒定慧修戒獲定得大果報修定獲智得大果報修智心淨得等解脫盡於三漏欲漏有漏無明漏已得解脫生解脫智生死已盡梵行已立所作已辦不受後有爾時世尊於竹園隨宜住已告阿難曰汝等皆嚴當詣巴陵弗城對曰唯然即嚴衣鉢與諸大衆侍從世尊路由摩竭次到巴陵弗城巴陵樹下坐時諸清信士聞佛與諸大衆遠來至此巴陵樹下即共出城遙見世尊在巴陵樹下容貌端正諸根寂定善調第一譬猶大龍以水清澄無有塵垢三十二相八十種好莊嚴其身見已歡喜漸到佛所頭面禮足却坐一面爾時世尊漸為説法示教利喜諸清信士聞佛説法即白佛言我欲歸依佛法聖衆唯願世尊哀愍聽許為優婆塞自今已後不殺不盜不淫不欺不飲酒奉戒不忘明欲設供唯願世尊與諸大衆垂愍屈顧爾時世尊默然許可諸清信士見佛默然即從座起繞佛三匝作禮而歸尋為如來起大堂舍平治處所掃灑燒香嚴敷寶座供設既辦往白世尊所設已具唯聖知時於是世尊即從座起著衣持鉢與大衆俱詣彼講堂澡手洗足處中而坐時諸比丘在左面坐諸清信士在右面坐爾時世尊告諸清信士曰凡人犯戒有五衰耗何謂為五一者求財所願不遂二者設有所得日當衰耗三者在所至處衆所不敬四者醜名惡聲流聞天下五者身壞命終當入地獄又告諸清信士凡人持戒有五功德何謂為五一者諸有所求輒得如願二者所有財産增益無損三者所往之處衆人敬愛四者好名善譽周聞天下五者身壞命終必生天上時夜已半告諸信士宜各還歸諸清信士即承佛教繞佛三匝禮足而歸爾時世尊於後夜明相出時至間靜處天眼清徹見諸大天神各封宅地中神下神亦封宅地是時世尊即還講堂就座而坐世尊知時故問阿難誰造此巴陵弗城阿難白佛此是禹舍大臣所造以防禦跋祇佛告阿難造此城者正得天意吾於後夜明相出時至間靜處以天眼見諸大神天各封宅地中下諸神亦封宅地阿難當知諸大神天所封宅地有人居者安樂熾盛中神所封中人所居下神所封下人所居功德多少各隨所止阿難此處賢人所居商賈所集國法真實無有欺罔此城最勝諸方所推不可破壞此城久後若欲壞時必以三事一者大水二者大火三者中人與外人謀乃壞此城時巴陵弗諸清信士通夜供辦時到白佛食具已辦唯聖知時時清信士即便施設手自斟酌食訖行水別取小牀敷在佛前坐爾時世尊即示之曰今汝此處賢智所居多持戒者淨修梵行善神歡喜即為呪願可敬知敬可事知事博施兼愛有慈愍心諸天所稱常與善俱不與惡會爾時世尊為説法已即從座起大衆圍繞侍送而還大臣禹舍從佛後行時作是念今沙門瞿曇出此城門即名此門為瞿曇門又觀如來所渡河處即名此處為瞿曇河爾時世尊出巴陵弗城至于水邊時水岸上人民衆多中有乘船渡者或有乘筏或有乘桴而渡河者爾時世尊與諸大衆譬如力士屈伸臂頃忽至彼岸世尊觀此義已即説頌曰佛為海船師法橋渡河津大乘道之輿一切渡天人亦為自解結渡岸得升仙都使諸弟子縛解得涅槃爾時世尊從跋祇遊行至拘利村在一林下告諸比丘有四深法一曰聖戒二曰聖定三曰聖慧四曰聖解脫此法微妙難可解知我及汝等不曉了故久在生死流轉無窮爾時世尊觀此義已即説頌曰戒定慧解上唯佛能分別離苦而化彼令斷生死習爾時世尊於拘利村隨宜住已告阿難俱詣那陀村阿難受教即著衣持鉢與大衆俱侍從世尊路由跋祇到那陀村止揵椎處爾時阿難在間靜處默自思惟此那陀村十二居士一名伽伽羅二名伽陵伽三名毗伽陀四名伽利輸五名遮樓六名婆耶樓七名婆頭樓八名藪婆頭樓九名陀梨舍䨲十名藪達利舍䨲十一名耶輸十二名耶輸多樓此諸人等今者命終為生何處復有五十人命終又復有五百人命終斯生何處作是念已從靜處起至世尊所頭面禮足在一面坐白佛言世尊我向靜處默自思惟此那陀村十二居士伽伽羅等命終復有五十人命終又有五百人命終斯生何處唯願解説佛告阿難伽伽羅等十二人斷五下分結命終生天於彼即般涅槃不復還此五十人命終者斷除三結淫怒癡薄得斯陀含還來此世盡於苦本五百人命終者斷除三結得須陀洹不墮惡趣必定成道往來七生盡於苦際阿難夫生有死自世之常此何足怪若一一人死來問我者非擾亂耶阿難答曰信爾世尊實是擾亂佛告阿難今當為汝説於法鏡使聖弟子知所生處三惡道盡得須陀洹不過七生必盡苦際亦能為他説如是事阿難法鏡者謂聖弟子得不壞信歡喜信佛如來無所著等正覺十號具足歡喜信法真正微妙自恣所説無有時節示涅槃道智者所行歡喜信僧善共和同所行質直無有諛諂道果成就上下和順法身具足向須陀洹得須陀洹向斯陀含得斯陀含向阿那含得阿那含向阿羅漢得阿羅漢四雙八輩是謂如來賢聖之衆甚可恭敬世之福田信賢聖戒清淨無穢無有缺漏明哲所行獲三昧定阿難是為法鏡使聖弟子知所生處三惡道盡得須陀洹不過七生必盡苦際亦能為他説如是事爾時世尊隨宜住已告阿難俱詣毗舍離國即受教行著衣持鉢與大衆俱侍從世尊路由跋祇到毗舍離坐一樹下有一淫女名菴婆婆梨聞佛將諸弟子來至毗舍離坐一樹下即嚴駕寶車欲往詣佛所禮拜供養未至之間遙見世尊顏貌端正諸根特異相好備足如星中月見已歡喜下車步進漸至佛所頭面禮足却坐一面爾時世尊漸為説法示教利喜聞佛所説發歡喜心即白佛言從今日始歸依三尊唯願聽許於正法中為優婆夷盡此形壽不殺不盜不邪淫不妄語不飲酒又白佛言唯願世尊及諸弟子明受我請即於今暮止宿我園爾時世尊默然受之女見佛默然許可即從座起頭面禮足繞佛而歸其去未久佛告阿難當與汝等詣彼園觀對曰唯然佛即從座起攝持衣鉢與衆弟子千二百五十人俱詣彼園時毗舍離諸隸車輩聞佛在菴婆婆梨園中止住即便嚴駕五色寶車或乘青車青馬衣蓋幢幡官屬皆青五色車馬皆亦如是時五百隸車服色盡同欲往詣佛菴婆婆梨辭佛還家中路逢諸隸車時車行奔疾與彼寶車共相鈎撥損折幢蓋而不避道隸車責曰汝恃何勢行不避道衝撥我車損折麾蓋報曰諸貴我已請佛明日設食歸家供辦是以行速無容相避諸隸車即語女曰且置汝請當先與我我當與汝百千兩金女尋答曰先請已定不得相與時諸隸車又語女曰我更與汝十六倍百千兩金必使我先女猶不肯我請已定不可爾也時諸隸車又語女曰我今與爾中分國財可先與我女又報曰設使舉國財寶我猶不取所以然者佛住我園先受我請此事已了終不相與諸隸車等各振手歎吒今由斯女闕我初福即便前進徑詣彼園爾時世尊遙見五百隸車車馬數萬填道而來告諸比丘汝等欲知忉利諸天遊戲園觀威儀容飾與此無異汝等比丘當自攝心具諸威儀云何比丘自攝其心於是比丘內身身觀精勤不懈憶念不忘捨世貪憂外身身觀精勤不懈憶念不忘捨世貪憂內外身觀精勤不懈捨世貪憂受意法觀亦復如是云何比丘具諸威儀於是比丘可行知行可止知止左右顧視屈伸俯仰攝持衣鉢食飲湯藥不失宜則善設方便除去蔭蓋行住坐臥覺寤語默攝心不亂是謂比丘具諸威儀爾時五百隸車往至菴婆婆梨園欲到佛所下車步進頭面禮足却坐一面如來在座光相獨顯蔽諸大衆譬如秋月又如天地清明淨無塵翳日在虛空光明獨照爾時五百隸車圍繞侍坐佛於衆中光相獨明是時坐中有一梵志名曰并饜即從座起偏袒右臂右膝著地叉手向佛以偈讚曰摩竭鴦伽王為快得善利身被寶珠鎧世尊出其土威德動三千名顯如雪山如蓮花開敷香氣甚微妙今覩佛光明如日之初出如月遊虛空無有諸雲翳世尊亦如是光照於世間觀如來智慧猶暗覩錠鐐施衆以明眼決了諸疑惑時五百隸車聞此偈已復告并饜汝可重説爾時并饜即於佛前再三重説時五百隸車聞重説偈已各脫寶衣以施并饜并饜即以寶衣奉上如來佛愍彼故即為納受爾時世尊告毗舍離諸隸車曰世有五寶甚為難得何等為五一者如來至真出現於世甚為難得二者如來正法能演説者此人難得三者如來演法能信解者此人難得四者如來演法能成就者此人難得五者嶮危救厄知反復者此人難得是謂五寶為難得也時五百隸車聞佛示教利喜已即白佛言唯願世尊及諸弟子明受我請佛告隸車卿已請我我今便為得供養已菴婆婆梨女先已請訖時五百隸車聞菴婆婆梨女已先請佛各振手而言吾欲供養如來而今此女已奪我先即從座起頭面禮佛繞佛三匝各自還歸時菴婆婆梨女即於其夜種種供辦明日時到世尊即與千二百五十比丘整衣持鉢前後圍繞詣彼請所就座而坐時菴婆婆梨女即設上饌供佛及僧食訖去鉢并除機案時女手執金瓶行澡水畢前白佛言此毗耶離城所有園觀我園最勝今以此園貢上如來哀愍我故願垂納受佛告女曰汝可以此園施佛為首及招提僧所以然者如來所有園林房舍衣鉢六物正使諸魔釋梵大神力天無有能堪受此供者時女受教即以此園施佛為首及招提僧佛愍彼故即為受之而説偈言起塔立精舍園果施清涼橋船以渡人曠野施水草及以堂閣施其福日夜增戒具清淨者彼必到善方時菴婆婆梨女取一小牀於佛前坐佛漸為説法示教利喜施論戒論生天之論欲為大患穢汙不淨上漏為礙出要為上爾時世尊知彼女意柔軟和悅蔭蓋微薄易可開化如諸佛法即為彼女説苦聖諦苦集苦滅苦出要諦時菴婆婆梨女信心清淨譬如淨潔白氈易為受色即於座上遠塵離垢諸法法眼生見法得法決定正住不墮惡道成就無畏而白佛言我今歸依佛歸依法歸依僧如是再三唯願如來聽我於正法中為優婆夷自今已後盡壽不殺不盜不邪淫不欺不飲酒時彼女從佛受五戒已捨本所習穢垢消除即從座起禮佛而去爾時世尊於毗舍離隨宜住已告阿難言汝等皆嚴吾欲詣竹林叢對曰唯然即嚴衣鉢與大衆侍從世尊路由跋祇至彼竹林時有婆羅門名毗沙陀耶聞佛與諸大衆詣此竹林默自思念此沙門瞿曇名德流布聞於四方十號具足於諸天釋梵魔若魔天沙門婆羅門中自身作證為他説法上中下言皆悉真正義味深奧梵行具足如此真人宜往瞻覩時婆羅門出於竹叢往詣世尊問訊訖一面坐世尊漸為説法示教利喜婆羅門聞已歡喜即請世尊及諸大衆明日舍食時佛默然受請婆羅門知已許可即從座起繞佛而歸即於其夜供設飲食明日時到唯聖知時爾時世尊著衣持鉢大衆圍繞往詣彼舍就座而坐時婆羅門設種種甘饌供佛及僧食訖去鉢行澡水畢取一小牀於佛前坐爾時世尊為婆羅門而作頌曰若以飲食衣服臥具施持戒人則獲大果此為真伴終始相隨所至到處如影隨形是故種善為後世糧福為根基衆生以安福為天護行不危嶮生不遭難死則上天爾時世尊為婆羅門説微妙法示教利喜已從座而去于時彼土穀貴飢饉乞求難得佛告阿難敕此國內現諸比丘盡集講堂對曰唯然即承教旨宣令遠近普集講堂是時國內大衆皆集阿難白佛言大衆已集唯聖知時爾時世尊即從座起詣於講堂就座而坐告諸比丘此土飢饉乞求難得汝等宜各分部隨所知識詣毗舍離及越祇國於彼安居可以無乏吾獨與阿難於此安居所以然者恐有短乏是時諸比丘受教即行佛與阿難獨留於後夏安居中佛身疾生舉體皆痛佛自念言我今疾生舉身痛甚而諸弟子悉皆不在若取涅槃則非我宜今當精勤自力以留壽命爾時世尊於靜室出坐清涼處阿難見已速疾往詣而白佛言今觀尊顏疾如有損阿難又言世尊有疾我心惶懼憂結荒迷不識方面氣息未絶猶少醒悟默思如來未即滅度世眼未滅大法未損何故今者不有教令於衆弟子乎佛告阿難衆僧於我有所須耶若有自言我持衆僧我攝衆僧斯人於衆應有教命如來不言我持於衆我攝於衆豈當於衆有教令乎阿難我所説法內外已訖終不自稱所見通達吾已老矣年且八十譬如故車方便修治得有所至吾身亦然以方便力得少留壽自力精進忍此苦痛不念一切想入無想定時我身安隱無有惱患是故阿難當自熾燃熾燃於法勿他熾燃當自歸依歸依於法勿他歸依云何自熾燃熾燃於法勿他熾燃當自歸依歸依於法勿他歸依阿難比丘觀內身精勤無懈憶念不忘除世貪憂觀外身觀內外身精勤不懈憶念不忘除世貪憂受意法觀亦復如是是謂阿難自熾燃熾燃於法勿他熾燃當自歸依歸依於法勿他歸依佛告阿難吾滅度後能有修行此法者則為真我弟子第一學者佛告阿難俱至遮婆羅塔對曰唯然如來即起著衣持鉢詣一樹下告阿難敷座吾患背痛欲於此止對曰唯然尋即敷座如來坐已阿難敷一小座於佛前坐佛告阿難諸有修四神足多修習行常念不忘在意所欲可得不死一劫有餘阿難佛四神足已多修行專念不忘在意所欲如來可止一劫有餘為世除冥多所饒益天人獲安爾時阿難默然不對如是再三又亦默然是時阿難為魔所蔽曚曚不悟佛三現相而不知請佛告阿難宜知是時阿難承佛意旨即從座起禮佛而去去佛不遠在一樹下靜意思惟其間未久時魔波旬來白佛佛意無欲可般涅槃今正是時宜速滅度佛告波旬且止且止我自知時如來今者未取涅槃須我諸比丘集又能自調勇捍無怯到安隱處逮得己利為人導師演布經教顯於句義若有異論能以正法而降伏之又以神變自身作證如是弟子皆悉未集又諸比丘尼優婆塞優婆夷普皆如是亦復未集今者要當廣於梵行演布覺意使諸天人普見神變時魔波旬復白佛言佛昔於鬱鞞羅尼連禪水邊阿遊波尼俱律樹下初成正覺我時至世尊所勸請如來可般涅槃今正是時宜速滅度爾時如來即報我言止止波旬我自知時如來今者未取涅槃須我諸弟子集乃至天人見神變化乃取滅度佛今弟子已集乃至天人見神變化今正是時何不滅度佛言止止波旬佛自知時不久住也是後三月於本生處拘尸那竭娑羅園雙樹間當取滅度時魔即念佛不虛言今必滅度歡喜踊躍忽然不現魔去未久佛即於遮婆羅塔定意三昧捨命住壽當此之時地大震動舉國人民莫不驚怖衣毛為竪佛放大光徹照無窮幽冥之處莫不蒙明各得相見爾時世尊以偈頌曰有無二行中吾今捨有為內專三昧定如鳥出於卵爾時賢者阿難心驚毛竪疾行詣佛頭面禮足却住一面白佛言怪哉世尊地動乃爾是何因緣佛告阿難凡世地動有八因緣何等八夫地在水上水止於風風止於空空中大風有時自起則大水擾大水擾則普地動是為一也復次阿難有時得道比丘比丘尼及大神尊天觀水性多觀地性少欲自試力則普地動是為二也復次阿難若始菩薩從兜率天降神母胎專念不亂地為大動是為三也復次阿難菩薩始出母胎從右脅生專念不亂則普地動是為四也復次阿難菩薩初成無上正覺當於此時地大震動是為五也復次阿難佛初成道轉無上法輪魔若魔天沙門婆羅門諸天世人所不能轉則普地動是為六也復次阿難佛教將畢專念不亂欲捨性命則普地動是為七也復次阿難如來於無餘涅槃界般涅槃時地大振動是為八也以是八因緣令地大動爾時世尊即説偈言無上二足尊照世大沙門阿難請天師地動何因緣如來演慈音聲如迦毗陵我説汝等聽地動之所由地因水而止水因風而住若虛空風起則地為大動比丘比丘尼欲試神足力山海百草木大地皆震動釋梵諸尊天意欲動於地山海諸鬼神大地為震動菩薩二足尊百福相已具始入母胎時地則為大動十月處母胎如龍臥茵蓐初從右脅生時地則大動佛為童子時消滅使緣縛成道勝無量地則為大動升仙轉法輪於鹿野苑中道力降伏魔則地大為動天魔頻來請勸佛般泥洹佛為捨性命地則為大動人尊大導師神仙盡後有難動而取滅時地則大動淨眼説諸緣地動八事動有此亦有餘時地皆震動
